<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ShareSpot | Meu Perfil</title>
        <link rel="icon" type="image/png" href="../imgs/logo_2.png"/>
        <link rel="stylesheet" href="../styles/styles.css">
        <link href='https://cdn.boxicons.com/3.0.6/fonts/basic/boxicons.min.css' rel='stylesheet'>
        <script src="../scripts/barra-nav-script.js"></script>
    </head>
    <body class="body-perfil">
        <div id="link-navbar"></div> <!-- Div onde a barra de navegação será carregada -->

        <div class="container-form-perfil">
            <form class="caixa-editar" method="POST" action="/update-cadastro">
                <h1 class="titulo-form">Minhas Informações</h1>
                <div class="inputs-form">
                    
                    <div class="tipo-usuario-linha" >
                        <label >Tipo de Usuário:</label>
                        <p id="tipo-usuario-texto">Teste</p>
                    </div>
                    <input type="hidden" name="token" id="tokenField">
                    <input type="hidden" name="id" id="idField">
                    <div class="caixa-input">
                        <input type="text" name="name" class="inputs campo-input" placeholder="Insira seu novo nome">
                        <i class='bx  bx-user'></i> 
                    </div>
                    <div class="caixa-input">
                        <input type="email" name="email" class="inputs campo-input" placeholder="Insira seu novo email">
                        <i class='bx  bx-envelope'></i> 
                    </div>
                    <div class="caixa-input">
                        <input type="tel" name="phone" id="telefoneInput" class="inputs campo-input" placeholder="Insira seu novo telefone">
                        <i class='bx  bx-phone'></i> 
                    </div>
                    <div class="caixa-input">
                        <input type="password" name="password" class="inputs campo-input" placeholder="Insira uma nova senha">
                        <i class='bx  bx-lock'></i> 
                    </div>
                    <button type="submit" class="inputs botao-entrar" >Alterar Informações</button>
                    <div class="btn-apagar">
                        <p class="">Apagar Conta</p>
                    </div>
                </div>
            </form>
        </div>
        <script> // Script para preencher o formulário com os dados do usuário logado
            document.addEventListener("DOMContentLoaded", () => {
                const user = JSON.parse(localStorage.getItem("user"));
                const form = document.querySelector(".caixa-editar");

                form.name.value = user.name;
                form.email.value = user.email;
                form.password.value = user.password; //Só será preenchida para fins de demonstração, não deve ser usada em produção.
                document.getElementById("telefoneInput").value = user.phone;
                document.getElementById("tokenField").value = localStorage.getItem("token");
                document.getElementById("idField").value = user.id;

                const tipoUsuarioTexto = document.getElementById("tipo-usuario-texto");
                tipoUsuarioTexto.textContent = user.isONG ? "ONG" : "Doador";
            });
        
        </script>
    </body>
</html>
